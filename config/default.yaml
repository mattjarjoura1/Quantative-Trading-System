# Default strategy configuration

pair:
  asset_a: "GOOG"
  asset_b: "GOOGL"

data:
  source: "yahoo"            # yahoo | csv | binance
  start_date: "2022-01-01"
  end_date: "2022-02-04"
  interval: "1d"             # 1d | 1h | 1m

hedger:
  method: "kalman"           # static_ols | kalman
  kalman:
    process_noise: 1.0e-5    # delta — how fast beta can drift
    measurement_noise: 1.0e-3  # R — observation noise

model:
  ou_window: 252             # observations for OU parameter fitting
  half_life_window: 60       # observations for half-life estimate
  refit_every: 100           # re-estimate OU params every N observations

decision:
  method: "bertram"          # zscore | bertram
  zscore:
    window: 30
    entry_threshold: 2.0
    exit_threshold: 0.0
  bertram:
    round_trip_cost: 0.01    # in spread units

backtest:
  initial_capital: 10000.0
  position_size: 1.0         # units of spread per trade
